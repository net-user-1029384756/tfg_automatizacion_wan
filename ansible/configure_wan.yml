---
# Fase 4 (Ansible) — Configuración de la red de datos WAN/LAN.
#
# Para cada interfaz de datos de cada router:
#   1. Habilita la interfaz.
#   2. Elimina cualquier dirección IP previa.
#   3. Asigna la dirección IP definitiva.
#
# NOTA: ether1 es la interfaz de gestión y nunca se toca aquí.

- name: "Fase 4 — Configurar interfaces de datos (WAN/LAN)"
  hosts: routers
  gather_facts: false

  vars:
    wan_interfaces:
      R1:
        - { name: ether3, address: "10.0.12.1/30",   description: "R1 -> R2" }
        - { name: ether4, address: "10.0.13.1/30",   description: "R1 -> R3" }
        - { name: ether5, address: "10.0.14.1/30",   description: "R1 -> R4" }
      R2:
        - { name: ether2, address: "10.0.12.2/30",   description: "R2 -> R1" }
        - { name: ether5, address: "10.0.24.1/30",   description: "R2 -> R4" }
      R3:
        - { name: ether2, address: "10.0.13.2/30",   description: "R3 -> R1" }
        - { name: ether4, address: "192.168.3.1/24",  description: "R3 LAN"   }
        - { name: ether5, address: "10.0.34.1/30",   description: "R3 -> R4" }
      R4:
        - { name: ether2, address: "10.0.14.2/30",   description: "R4 -> R1" }
        - { name: ether3, address: "10.0.24.2/30",   description: "R4 -> R2" }
        - { name: ether4, address: "10.0.34.2/30",   description: "R4 -> R3" }
        - { name: ether5, address: "192.168.4.1/24",  description: "R4 LAN"   }

  tasks:
    - name: "Habilitar interfaces de datos"
      community.network.routeros_command:
        commands:
          - "/interface ethernet enable {{ item.name }}"
      loop: "{{ wan_interfaces[inventory_hostname] }}"
      loop_control:
        label: "{{ inventory_hostname }} / {{ item.name }}"

    - name: "Eliminar IPs previas en interfaces de datos"
      community.network.routeros_command:
        commands:
          - "/ip address remove [find interface={{ item.name }}]"
      loop: "{{ wan_interfaces[inventory_hostname] }}"
      loop_control:
        label: "{{ inventory_hostname }} / {{ item.name }}"

    - name: "Asignar dirección IP y descripción"
      community.network.routeros_command:
        commands:
          - >-
            /ip address add
            address={{ item.address }}
            interface={{ item.name }}
            comment="{{ item.description }}"
      loop: "{{ wan_interfaces[inventory_hostname] }}"
      loop_control:
        label: "{{ inventory_hostname }} / {{ item.name }} → {{ item.address }}"
